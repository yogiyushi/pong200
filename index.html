<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong200</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">Pong200</div>
      <div class="top-menu">
        <button id="optionsToggle" class="icon-button" aria-label="Options">
          <img src="icons/density_medium_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Options" />
        </button>
        <div id="optionsMenu" class="options-menu hidden" role="menu" aria-hidden="true">
          <div class="menu-header">Options</div>
          <div class="menu-item">
            <label for="ballInterval">Ball interval</label>
            <input id="ballInterval" type="range" min="0.001" max="10" step="0.001" value="5" />
            <div class="menu-note"><span id="ballIntervalLabel">5s</span></div>
          </div>
          <div class="menu-item">
            <label for="minBallSpeed">Min ball speed</label>
            <input id="minBallSpeed" type="range" min="1" max="100" step="1" value="3" />
            <div class="menu-note"><span id="minBallSpeedLabel">3</span></div>
          </div>
          <div class="menu-item">
            <label for="maxBallSpeed">Max ball speed</label>
            <input id="maxBallSpeed" type="range" min="1" max="100" step="1" value="4" />
            <div class="menu-note"><span id="maxBallSpeedLabel">4</span></div>
          </div>
          <div class="menu-item">
            <label for="maxBallCount">Total balls</label>
            <input id="maxBallCount" type="range" min="1" max="10000" step="1" value="400" />
            <div class="menu-note"><span id="maxBallCountLabel">400</span></div>
          </div>
          <div class="menu-item">
            <label for="playerPaddleSize">Player paddle size</label>
            <input id="playerPaddleSize" type="range" min="10" max="200" step="1" value="40" />
            <div class="menu-note"><span id="playerPaddleSizeLabel">40</span></div>
          </div>
          <div class="menu-item">
            <label for="botPaddleSize">Bot paddle size</label>
            <input id="botPaddleSize" type="range" min="10" max="200" step="1" value="40" />
            <div class="menu-note"><span id="botPaddleSizeLabel">40</span></div>
          </div>
          <div class="menu-item">
            <label for="startingBotCount">Starting bots</label>
            <input id="startingBotCount" type="range" min="0" max="300" step="1" value="199" />
            <div class="menu-note"><span id="startingBotCountLabel">199</span></div>
          </div>
          <div class="menu-item checkbox-item">
            <label>
              <input id="menuFlipView" type="checkbox" />
              Flip top-player view
            </label>
          </div>
          <div class="menu-item">
            <label for="playerName">Name</label>
            <input id="playerName" type="text" value="You" maxlength="12" />
          </div>
          <div class="menu-item">
            <label for="playerColor">Player bar color</label>
            <input id="playerColor" type="color" value="#ffffff" />
          </div>
          <button id="addBotButton" class="menu-button">+ Add bot</button>
          <button id="resetButton" class="menu-button">Reset game</button>
          <div class="menu-header">Players</div>
          <div id="playerList" class="player-list"></div>
        </div>
      </div>
    </header>
    <div class="info-bar">Welcome! Use the options menu in the top right for game settings and player controls. Click Join to begin.</div>
    <div class="join-bar">
      <button id="joinButton" class="join-button">Join</button>
    </div>
    <main class="main-grid">
      <section class="game-panel">
        <canvas id="pongCanvas" tabindex="0" width="960" height="450"></canvas>
        <canvas id="ballCanvas" class="ball-layer"></canvas>
      </section>
    </main>
    <div class="bottom-panel">
      <div class="zoom-bar">
        <label for="cameraZoom">Zoom</label>
        <input id="cameraZoom" type="range" min="0.1" max="1" step="0.01" value="1" />
        <span id="cameraZoomLabel">100%</span>
      </div>
      <div class="canvas-info-bar">
        <span>FPS: <strong id="canvasFPS">0</strong></span>
        <span>Frame time: <strong id="canvasFrameTime">0.0</strong>ms</span>
        <span>Players: <strong id="canvasPlayerCount">0</strong></span>
        <span>Balls: <strong id="canvasBallCount">0</strong></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
